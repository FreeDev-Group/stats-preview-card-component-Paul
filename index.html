<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="style.css" />

    <title>Frontend Mentor | Stats preview card component by PAUL</title>
  </head>
  <body>
    <div class="card">
      <div class="left">
        <h1>Get <strong>insights</strong> that help your business grow.</h1>
        <p>
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
        <div class="stats">
          <div class="stats1">
            <span class="list-stat">10k+</span>
            <p class="list-content">companies</p>
          </div>

          <div class="stats1">
            <span class="list-stat">314</span>
            <p class="list-content">templates</p>
          </div>

          <div class="stats1">
            <span class="list-stat">12M+</span>
            <p class="list-content">queries</p>
          </div>
        </div>
      </div>
      <div class="right">
        <!-- <img src="./images/image-header-desktop.jpg" alt="women smiling in an office"> -->
      </div>
    </div>

    <footer class="attribution">
      Challenge by
      <a
        href="https://www.frontendmentor.io?ref=challenge"
        target="_blank"
        rel="noopener noreferrer"
        >Frontend Mentor</a
      >. Coded by
      <a
        href="https://github.com/Paul-Afumba"
        target="_blank"
        rel="noopener noreferrer"
        >Paul AFUMBA</a
      >.
    </footer>
  </body>
</html>
